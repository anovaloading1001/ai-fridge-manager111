<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的冰箱</title>

<!-- 🔥 苹果桌面图标（强制生效版）-->
<link rel="apple-touch-icon" sizes="180x180" href="https://i.imgur.com/YZUJ9Ls.png">
<link rel="apple-touch-icon" sizes="152x152" href="https://i.imgur.com/YZUJ9Ls.png">
<link rel="apple-touch-icon" sizes="120x120" href="https://i.imgur.com/YZUJ9Ls.png">
<link rel="apple-touch-icon" sizes="76x76" href="https://i.imgur.com/YZUJ9Ls.png">

<!-- 全屏模式（无浏览器栏）-->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="我的冰箱">

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  body {
    background: #F9F6F0;
    background-image: radial-gradient(#EAE4D8 1px, transparent 1px);
    background-size: 18px 18px;
    color: #333;
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 100px;
  }
  .page { display: none; }
  .page.active { display: block; }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .title {
    font-size: 22px;
    font-weight: 600;
  }
  .back {
    font-size: 18px;
    cursor: pointer;
  }
  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 14px;
    background: #70A984;
    color: #fff;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 12px;
  }
  .btn-outline {
    background: #fff;
    border: 1px solid #EAE4D8;
    color: #555;
  }
  .small-btn {
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 12px;
    border: none;
    background: #f1f1f1;
    cursor: pointer;
  }
  .food-card {
    background: #fff;
    border-radius: 20px;
    padding: 16px;
    margin-bottom: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.04);
  }
  .food-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .food-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: #F8F5F0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }
  .food-info {
    flex: 1;
  }
  .food-name {
    font-weight: 500;
    font-size: 16px;
    margin-bottom: 2px;
  }
  .food-desc {
    font-size: 12px;
    color: #888;
  }
  .food-exp {
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 10px;
    color: #fff;
    display: inline-block;
    margin-top: 4px;
  }
  .exp-red { background: #E57373; }
  .exp-orange { background: #F5B767; }
  .exp-green { background: #70A984; }
  .action-row {
    margin-top: 10px;
    display: flex;
    gap: 6px;
  }
  .recipe-sheet {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed #eee;
  }
  .recipe-title {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 8px;
    color: #666;
  }
  .recipe-item {
    background: #f9f9f9;
    padding: 14px 16px;
    border-radius: 12px;
    margin-bottom: 8px;
    font-size: 15px;
    cursor: pointer;
  }
  .refresh-btn {
    font-size: 12px;
    color: #70A984;
    cursor: pointer;
    margin-left: 8px;
  }
  .input-group { margin-bottom: 14px; }
  .input-group label {
    display: block;
    font-size: 14px;
    margin-bottom: 6px;
    color: #666;
  }
  input, select {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #EAE4D8;
    border-radius: 12px;
    background: #fff;
    font-size: 15px;
  }
</style>
</head>
<body>

<div class="page active" id="main">
  <div class="header">
    <div class="title">🌱 我的冰箱</div>
    <button class="small-btn" onclick="goAdd()">➕ 添加</button>
  </div>
  <div id="foodList"></div>
</div>

<div class="page" id="editPage">
  <div class="header">
    <div class="back" onclick="goMain()">←</div>
    <div>食材信息</div>
  </div>
  <div class="input-group">
    <label>食材名称</label>
    <input id="foodName">
  </div>
  <div class="input-group">
    <label>保质期天数</label>
    <input id="foodDay" type="number">
  </div>
  <div class="input-group">
    <label>分类</label>
    <select id="foodCate">
      <option value="Vegetable">蔬菜 🥬</option>
      <option value="Fruit">水果 🍎</option>
      <option value="Meat">肉类 🥩</option>
      <option value="Seafood">海鲜 🦐</option>
      <option value="Dairy">蛋奶 🥛</option>
      <option value="Other">其他 🥦</option>
    </select>
  </div>
  <button class="btn" onclick="saveFood()">保存</button>
  <button class="btn btn-outline" onclick="goMain()">取消</button>
</div>

<script>
const recipeDB = {
  "土豆炖牛肉":{need:["牛肉","土豆","胡萝卜"],steps:["1.牛肉焯水去血沫","2.炒香葱姜，放入牛肉翻炒","3.加开水炖40分钟","4.放入土豆胡萝卜再炖20分钟","5.加盐出锅"]},
  "番茄炖牛肉":{need:["牛肉","西红柿"],steps:["1.牛肉焯水","2.炒香番茄出汁","3.加水炖50分钟","4.调味出锅"]},
  "青椒炒牛肉":{need:["牛肉","青椒"],steps:["1.牛肉腌制10分钟","2.热油快炒牛肉","3.放青椒翻炒","4.加盐出锅"]},
  "红烧牛肉":{need:["牛肉"],steps:["1.焯水","2.炒糖色","3.炖50分钟"]},
  "土豆炖牛腩":{need:["牛腩","土豆"],steps:["1.牛腩焯水","2.炖60分钟","3.加土豆炖20分钟"]},
  "番茄炖牛腩":{need:["牛腩","西红柿"],steps:["1.牛腩焯水","2.炒番茄","3.炖60分钟"]},
  "红烧肉":{need:["猪肉"],steps:["1.焯水","2.炒糖色","3.炖40分钟"]},
  "青椒炒肉":{need:["猪肉","青椒"],steps:["1.肉片腌制","2.大火快炒"]},
  "白切鸡":{need:["鸡肉"],steps:["1.冷水煮15分钟","2.关火焖10分钟","3.切块蘸酱油"]},
  "可乐鸡腿":{need:["鸡腿","可乐"],steps:["1.焯水","2.煎黄","3.加可乐收汁"]},
  "白灼虾":{need:["虾"],steps:["1.水开加姜片","2.放虾煮1分钟","3.捞出"]},
  "虾仁滑蛋":{need:["虾","鸡蛋"],steps:["1.腌制虾仁","2.滑蛋","3.混合出锅"]},
  "西红柿炒蛋":{need:["鸡蛋","西红柿"],steps:["1.鸡蛋打散","2.炒鸡蛋","3.炒西红柿","4.混合"]},
  "蒜蓉娃娃菜":{need:["娃娃菜","大蒜"],steps:["1.焯水","2.炒蒜蓉淋上"]},
  "酸辣土豆丝":{need:["土豆"],steps:["1.土豆切丝泡水","2.大火快炒","3.加醋盐"]}
};
const recipeMap = {
  "牛肉":["土豆炖牛肉","番茄炖牛肉","青椒炒牛肉","红烧牛肉"],
  "牛腩":["土豆炖牛腩","番茄炖牛腩"],
  "猪肉":["红烧肉","青椒炒肉"],
  "鸡肉":["白切鸡"],
  "鸡腿":["可乐鸡腿"],
  "虾":["白灼虾","虾仁滑蛋"],
  "鸡蛋":["西红柿炒蛋"],
  "娃娃菜":["蒜蓉娃娃菜"],
  "土豆":["酸辣土豆丝"]
};
const aliasMap = {"牛腩":"牛肉","牛蹄筋":"牛肉","五花肉":"猪肉","瘦肉":"猪肉","鸡胸肉":"鸡肉","基围虾":"虾"};
function isIngredientMatch(u,t){if(u===t)return true;if(aliasMap[u]===t)return true;if(aliasMap[t]===u)return true;return false;}
let foods=JSON.parse(localStorage.getItem("foods"))||[];let editId=-1;let openRecipeId=-1;
function goMain(){document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));document.getElementById("main").classList.add("active");renderList();}
function goAdd(){editId=-1;document.getElementById("foodName").value="";document.getElementById("foodDay").value="";document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));document.getElementById("editPage").classList.add("active");}
function goEdit(rid){editId=rid;const f=foods[rid];document.getElementById("foodName").value=f.name;document.getElementById("foodDay").value=f.day;document.getElementById("foodCate").value=f.cate;document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));document.getElementById("editPage").classList.add("active");}
function saveFood(){const n=document.getElementById("foodName").value.trim();const d=+document.getElementById("foodDay").value;const c=document.getElementById("foodCate").value;if(!n||!d){alert("请填写完整");return;}const it={name:n,day:d,cate:c,time:Date.now()};editId>=0?foods[editId]=it:foods.push(it);localStorage.setItem("foods",JSON.stringify(foods));goMain();}
function delFood(rid){if(!confirm("确认删除？"))return;foods.splice(rid,1);localStorage.setItem("foods",JSON.stringify(foods));renderList();}
function getIcon(c){const m={Vegetable:"🥬",Fruit:"🍎",Meat:"🥩",Seafood:"🦐",Dairy:"🥛",Other:"🥦"};return m[c]||"🥦";}
function getExpInfo(f){const p=Math.floor((Date.now()-f.time)/86400000);const l=Math.max(0,f.day-p);const cl=l<=1?"exp-red":l<=3?"exp-orange":"exp-green";const tx=l<=0?"已过期":l+"天";return{left:l,cls:cl,text:tx};}
function getRecList(n){const k=aliasMap[n]||n;return recipeMap[k]||[];}
function toggleRec(rid){openRecipeId=openRecipeId===rid?-1:rid;renderList();}
function openRec(rid,rn){const d=recipeDB[rn];if(!d){alert("暂无做法");return;}
const h=d.need.map(i=>foods.some(f=>isIngredientMatch(f.name,i))?`✅ ${i}`:`⚪ ${i}`).join("\n");
const s=d.steps.join("\n");alert(`【${rn}】\n\n食材：\n${h}\n\n步骤：\n${s}`);}
function renderList(){const c=document.getElementById("foodList");if(foods.length===0){c.innerHTML=`<div style="text-align:center;padding:40px;color:#999">暂无食材</div>`;return;}
const s=[...foods].map((f,id)=>({f,id})).sort((a,b)=>getExpInfo(a.f).left-getExpInfo(b.f).left);
c.innerHTML=s.map(it=>{const rid=it.id;const f=it.f;const ex=getExpInfo(f);const ic=getIcon(f.cate);const p=Math.floor((Date.now()-f.time)/86400000);const rs=getRecList(f.name);const sh=openRecipeId===rid;const sl=rs.sort(()=>Math.random()-0.5).slice(0,3);
return`<div class="food-card"><div class="food-row"><div class="food-icon">${ic}</div><div class="food-info"><div class="food-name">${f.name}</div><div class="food-desc">保质期${f.day}天·已放${p}天</div><div class="food-exp ${ex.cls}">剩余${ex.text}</div></div></div><div class="action-row"><button class="small-btn" onclick="goEdit(${rid})">编辑</button><button class="small-btn" onclick="delFood(${rid})">删除</button><button class="small-btn" onclick="toggleRec(${rid})">${sh?"收起菜谱":"查看菜谱"}</button></div>${sh?`<div class="recipe-sheet"><div style="display:flex;justify-content:space-between"><span class="recipe-title">推荐菜谱（${f.name}）</span><span class="refresh-btn" onclick="toggleRec(${rid});setTimeout(()=>toggleRec(${rid}),50)">换一批</span></div>${sl.map(r=>`<div class="recipe-item" onclick="openRec(${rid},'${r}')">${r}</div>`).join('')}${sl.length===0?'<div style="font-size:12px;color:#888">暂无推荐</div>':''}</div>`:''}</div>`;}).join('');}
renderList();
</script>
</body>
</html>
