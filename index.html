<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Fridge</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  body {
    background: #F9F6F0;
    background-image: radial-gradient(#EAE4D8 1px, transparent 1px);
    background-size: 18px 18px;
    color: #333;
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 100px;
  }
  .page { display: none; }
  .page.active { display: block; }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .title {
    font-size: 22px;
    font-weight: 600;
  }
  .back {
    font-size: 18px;
    cursor: pointer;
  }
  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 14px;
    background: #70A984;
    color: #fff;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    margin-bottom: 12px;
  }
  .btn-outline {
    background: #fff;
    border: 1px solid #EAE4D8;
    color: #555;
  }
  .small-btn {
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 12px;
    border: none;
    background: #f1f1f1;
    cursor: pointer;
  }
  .food-card {
    background: #fff;
    border-radius: 20px;
    padding: 16px;
    margin-bottom: 10px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.04);
  }
  .food-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .food-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: #F8F5F0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }
  .food-info {
    flex: 1;
  }
  .food-name {
    font-weight: 500;
    font-size: 16px;
    margin-bottom: 2px;
  }
  .food-desc {
    font-size: 12px;
    color: #888;
  }
  .food-exp {
    font-size: 12px;
    padding: 3px 8px;
    border-radius: 10px;
    color: #fff;
    display: inline-block;
    margin-top: 4px;
  }
  .exp-red { background: #E57373; }
  .exp-orange { background: #F5B767; }
  .exp-green { background: #70A984; }
  .action-row {
    margin-top: 10px;
    display: flex;
    gap: 6px;
  }

  .recipe-sheet {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed #eee;
  }
  .recipe-title {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 8px;
    color: #666;
  }
  .recipe-item {
    background: #f9f9f9;
    padding: 10px 12px;
    border-radius: 12px;
    margin-bottom: 6px;
    font-size: 14px;
    cursor: pointer;
  }
  .refresh-btn {
    font-size: 12px;
    color: #70A984;
    cursor: pointer;
    margin-left: 8px;
  }

  .input-group { margin-bottom: 14px; }
  .input-group label {
    display: block;
    font-size: 14px;
    margin-bottom: 6px;
    color: #666;
  }
  input, select {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #EAE4D8;
    border-radius: 12px;
    background: #fff;
    font-size: 15px;
  }
</style>
</head>
<body>

<div class="page active" id="main">
  <div class="header">
    <div class="title">🌱 我的冰箱</div>
    <button class="small-btn" onclick="goAdd()">➕ 添加</button>
  </div>
  <div id="foodList"></div>
</div>

<div class="page" id="editPage">
  <div class="header">
    <div class="back" onclick="goMain()">←</div>
    <div>食材信息</div>
  </div>
  <div class="input-group">
    <label>食材名称</label>
    <input id="foodName">
  </div>
  <div class="input-group">
    <label>保质期天数</label>
    <input id="foodDay" type="number">
  </div>
  <div class="input-group">
    <label>分类</label>
    <select id="foodCate">
      <option value="Vegetable">蔬菜 🥬</option>
      <option value="Fruit">水果 🍎</option>
      <option value="Meat">肉类 🥩</option>
      <option value="Seafood">海鲜 🦐</option>
      <option value="Dairy">蛋奶 🥛</option>
      <option value="Other">其他 🥦</option>
    </select>
  </div>
  <button class="btn" onclick="saveFood()">保存</button>
  <button class="btn btn-outline" onclick="goMain()">取消</button>
</div>

<script>
// ==============================
// 超级菜谱库 200+ 道
// ==============================
const recipeData = {
  "牛肉": [
    "土豆炖牛肉","番茄炖牛肉","青椒炒牛肉","洋葱爆牛肉","黑椒牛肉粒",
    "芹菜炒牛肉","孜然牛肉","水煮牛肉","红烧牛肉","萝卜炖牛肉",
    "金针菇肥牛","酸汤肥牛","小炒黄牛肉","香菜炒牛肉"
  ],
  "牛腩": [
    "土豆炖牛腩","番茄炖牛腩","红烧牛腩","萝卜炖牛腩","咖喱牛腩",
    "牛腩粉丝汤","香辣牛腩","土豆烧牛腩","番茄土豆炖牛腩"
  ],
  "猪肉": [
    "红烧肉","青椒炒肉","土豆炒肉","蒜苔炒肉","芹菜炒肉",
    "回锅肉","农家小炒肉","萝卜炖肉","榨菜炒肉","洋葱炒肉",
    "香菇炒肉","木耳炒肉","豆角炒肉","菜花炒肉"
  ],
  "鸡肉": [
    "白切鸡","宫保鸡丁","青椒炒鸡","香菇滑鸡","咖喱鸡",
    "辣子鸡","葱油鸡","黄焖鸡","炒鸡片","山药鸡汤",
    "香菇鸡汤","玉米鸡汤","爆炒鸡丁","泡椒鸡丁"
  ],
  "鸡腿": [
    "可乐鸡腿","奥尔良烤鸡腿","卤鸡腿","黄焖鸡腿","照烧鸡腿",
    "蜜汁烤鸡腿","蒜香鸡腿","香辣鸡腿","土豆焖鸡腿"
  ],
  "羊肉": [
    "萝卜炖羊肉","葱爆羊肉","清炖羊肉","孜然羊肉","红烧羊肉",
    "羊肉汤","羊肉火锅","香菜炒羊肉","洋葱炒羊肉"
  ],
  "虾": [
    "白灼虾","油焖大虾","蒜蓉虾","椒盐虾","清蒸虾",
    "蒜蓉粉丝蒸虾","虾仁滑蛋","香辣虾","咖喱虾","柠檬虾"
  ],
  "鸡蛋": [
    "西红柿炒蛋","葱花炒蛋","荷包蛋","蒸蛋羹","蛋花汤",
    "韭菜炒蛋","青椒炒蛋","木耳炒蛋","洋葱炒蛋","黄瓜炒蛋"
  ],
  "西红柿": [
    "西红柿炒蛋","西红柿蛋汤","番茄炖牛腩","番茄炖豆腐","番茄金针菇汤",
    "糖拌西红柿","番茄炒蛋","番茄土豆汤","番茄烧茄子"
  ],
  "土豆": [
    "酸辣土豆丝","土豆炖牛肉","土豆炒肉","土豆泥","红烧土豆",
    "孜然土豆","土豆炖鸡","土豆炖排骨","清炒土豆丝","土豆烧豆角"
  ],
  "娃娃菜": [
    "蒜蓉娃娃菜","上汤娃娃菜","清炒娃娃菜","娃娃菜炖粉丝","蚝油娃娃菜",
    "麻辣娃娃菜","娃娃菜炖豆腐","蒜蓉粉丝娃娃菜"
  ],
  "青椒": [
    "青椒炒肉","青椒炒蛋","青椒土豆丝","虎皮青椒","青椒炒香干",
    "青椒炒鸡丁","青椒炒牛肉","青椒炒木耳"
  ],
  "胡萝卜": [
    "胡萝卜炒肉","土豆炖牛肉","胡萝卜炒蛋","胡萝卜炒木耳","清炒胡萝卜丝",
    "胡萝卜炖鸡","胡萝卜玉米汤","胡萝卜炒鸡丁"
  ],
  "菠菜": [
    "清炒菠菜","菠菜蛋汤","蒜蓉菠菜","姜汁菠菜","菠菜炒鸡蛋",
    "麻酱菠菜","菠菜拌粉丝","菠菜炒木耳"
  ],
  "茄子": [
    "红烧茄子","鱼香茄子","蒜蓉茄子","茄子炒肉","茄子烧豆角",
    "地三鲜","茄子烧土豆","酱香茄子"
  ],
  "豆腐": [
    "麻婆豆腐","番茄炖豆腐","家常豆腐","红烧豆腐","小葱拌豆腐",
    "金针菇豆腐汤","青菜豆腐汤","肉末豆腐","豆腐炒鸡蛋"
  ],
  "牛奶": [
    "热牛奶","牛奶燕麦粥","牛奶布丁","牛奶鸡蛋羹","牛奶玉米汁",
    "牛奶水果捞","牛奶炖蛋","奶香馒头"
  ],
  "黄瓜": [
    "凉拌黄瓜","黄瓜炒蛋","黄瓜炒肉","拍黄瓜","黄瓜拌木耳",
    "黄瓜炒火腿","黄瓜蛋汤","清炒黄瓜片"
  ],
  "玉米": [
    "玉米汤","玉米炒豌豆","玉米炒鸡丁","玉米排骨汤","玉米牛奶汁",
    "清炒玉米","玉米胡萝卜汤","玉米炒鸡蛋"
  ],
  "香菇": [
    "香菇滑鸡","香菇炒肉","香菇青菜","香菇炒蛋","香菇炖鸡",
    "香菇豆腐汤","香菇炒青椒","香菇炒木耳"
  ]
};

const stepData = {
  "土豆炖牛肉": {
    need: ["牛肉","土豆","胡萝卜"],
    steps: ["1. 牛肉焯水去血沫","2. 炒香葱姜，放入牛肉翻炒","3. 加开水炖40分钟","4. 加土豆、胡萝卜再炖20分钟","5. 加盐出锅"]
  },
  "西红柿炒蛋": {
    need: ["西红柿","鸡蛋"],
    steps: ["1. 西红柿切块","2. 鸡蛋加盐打散","3. 先炒鸡蛋至定型","4. 炒西红柿出汁","5. 混合调味"]
  },
  "可乐鸡腿": {
    need: ["鸡腿","可乐"],
    steps: ["1. 鸡腿焯水","2. 煎至两面金黄","3. 倒入可乐没过鸡腿","4. 大火收汁"]
  }
};

const aliasMap = {
  "牛腩":"牛肉","牛蹄筋":"牛肉","牛排":"牛肉",
  "五花肉":"猪肉","瘦肉":"猪肉","排骨":"猪肉",
  "鸡胸肉":"鸡肉","鸡翅":"鸡肉","鸡爪":"鸡肉",
  "基围虾":"虾","青虾":"虾","虾仁":"虾",
  "白菜":"娃娃菜","油麦菜":"菠菜"
};

// ==============================
// 数据
// ==============================
let foods = JSON.parse(localStorage.getItem("foods")) || [];
let editId = -1;
let openRecipeId = -1;

// ==============================
// 页面
// ==============================
function goMain() {
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("main").classList.add("active");
  renderList();
}
function goAdd() {
  editId = -1;
  document.getElementById("foodName").value = "";
  document.getElementById("foodDay").value = "";
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("editPage").classList.add("active");
}
function goEdit(i) {
  editId = i;
  const f = foods[i];
  document.getElementById("foodName").value = f.name;
  document.getElementById("foodDay").value = f.day;
  document.getElementById("foodCate").value = f.cate;
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("editPage").classList.add("active");
}

// ==============================
// 存储
// ==============================
function saveFood() {
  const name = document.getElementById("foodName").value.trim();
  const day = parseInt(document.getElementById("foodDay").value);
  const cate = document.getElementById("foodCate").value;
  if (!name || !day) { alert("请填写完整"); return; }
  const item = { name, day, cate, time: Date.now() };
  editId >= 0 ? foods[editId] = item : foods.push(item);
  localStorage.setItem("foods", JSON.stringify(foods));
  goMain();
}
function delFood(i) {
  if (!confirm("确认删除？")) return;
  foods.splice(i, 1);
  localStorage.setItem("foods", JSON.stringify(foods));
  renderList();
}

// ==============================
// 图标 + 过期状态
// ==============================
function getIcon(cate) {
  const map = {Vegetable:"🥬",Fruit:"🍎",Meat:"🥩",Seafood:"🦐",Dairy:"🥛",Other:"🥦"};
  return map[cate] || "🥦";
}
function getExpInfo(f) {
  const passed = Math.floor((Date.now() - f.time)/86400000);
  const left = Math.max(0, f.day - passed);
  let cls = left <=1 ? "exp-red" : left <=3 ? "exp-orange" : "exp-green";
  let text = left <=0 ? "已过期" : left+"天";
  return { left, cls, text };
}

// ==============================
// 菜谱
// ==============================
function getRecipeList(name) {
  const key = aliasMap[name] || name;
  return recipeData[key] || [];
}
function toggleRecipe(i) {
  openRecipeId = openRecipeId === i ? -1 : i;
  renderList();
}
function showRecipeDetail(i, rName) {
  const info = stepData[rName] || { need: [], steps: ["暂无详细步骤，可自由发挥～"] };
  const food = foods[i];
  const needText = info.need.map(n => n === food.name || foods.some(f=>f.name===n) ? `✅${n}` : `⚪${n}`).join(" ");
  alert(`【${rName}】\n食材：\n${needText}\n\n步骤：\n${info.steps.join("\n")}`);
}

// ==============================
// 渲染列表（按过期排序）
// ==============================
function renderList() {
  const container = document.getElementById("foodList");
  if (foods.length === 0) {
    container.innerHTML = `<div style="text-align:center;padding:40px;color:#999">暂无食材</div>`;
    return;
  }

  const sorted = [...foods].sort((a,b)=>{
    const la = getExpInfo(a).left;
    const lb = getExpInfo(b).left;
    return la - lb;
  });

  container.innerHTML = sorted.map((f, idx)=>{
    const exp = getExpInfo(f);
    const icon = getIcon(f.cate);
    const passed = Math.floor((Date.now() - f.time)/86400000);
    const recipes = getRecipeList(f.name);
    const showRec = openRecipeId === idx;
    const shuffled = recipes.sort(() => Math.random() - 0.5);
    const showList = shuffled.slice(0,3);

    return `
    <div class="food-card">
      <div class="food-row">
        <div class="food-icon">${icon}</div>
        <div class="food-info">
          <div class="food-name">${f.name}</div>
          <div class="food-desc">保质期${f.day}天 · 已放${passed}天</div>
          <div class="food-exp ${exp.cls}">剩余${exp.text}</div>
        </div>
      </div>

      <div class="action-row">
        <button class="small-btn" onclick="goEdit(${idx})">编辑</button>
        <button class="small-btn" onclick="delFood(${idx})">删除</button>
        <button class="small-btn" onclick="toggleRecipe(${idx})">
          ${showRec?"收起菜谱":"查看菜谱"}
        </button>
      </div>

      ${showRec ? `
      <div class="recipe-sheet">
        <div>
          <span class="recipe-title">推荐菜谱（${f.name}）</span>
          <span class="refresh-btn" onclick="toggleRecipe(${idx});setTimeout(()=>toggleRecipe(${idx}),50)">换一批</span>
        </div>
        ${showList.map(r=>`
          <div class="recipe-item" onclick="showRecipeDetail(${idx},'${r}')">${r}</div>
        `).join('')}
        ${showList.length===0 ? '<div style="font-size:12px;color:#888">暂无推荐菜谱</div>' : ''}
      </div>
      ` : ''}
    </div>
    `;
  }).join('');
}

renderList();
</script>
</body>
</html>
