<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>冰箱食材管理</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  body {
    background: #F8F5F0;
    color: #4A453E;
    max-width: 480px;
    margin: 0 auto;
    padding-bottom: 90px;
  }
  .page {
    display: none;
    padding: 24px 20px;
  }
  .page.active {
    display: block;
    animation: fadeIn 0.25s ease forwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .header {
    font-size: 22px;
    font-weight: 600;
    color: #6A7764;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .back {
    font-size: 18px;
    cursor: pointer;
    padding: 4px 10px;
  }
  .card {
    background: #ffffff;
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 3px 12px rgba(110, 120, 100, 0.06);
    margin-bottom: 16px;
  }
  .btn {
    background: #A1C194;
    color: #fff;
    border: none;
    padding: 14px 18px;
    border-radius: 16px;
    width: 100%;
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 12px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn:hover {
    background: #92B383;
  }
  .btn-outline {
    background: transparent;
    border: 1px solid #A1C194;
    color: #6A7764;
  }
  .input,
  .select {
    width: 100%;
    border: 1px solid #EAE5DD;
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 12px;
    outline: none;
    font-size: 15px;
    background: #fff;
  }
  .food-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid #F3EEE5;
  }
  .food-item:last-child {
    border-bottom: none;
  }
  .food-name {
    font-weight: 500;
    font-size: 15px;
  }
  .food-info {
    font-size: 13px;
    color: #908A7F;
    margin-top: 4px;
  }
  .tag {
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 10px;
    font-weight: 500;
  }
  .tag.red {
    background: #FDEAEA;
    color: #D87777;
  }
  .tag.orange {
    background: #FEF2E2;
    color: #E2A26A;
  }
  .tag.green {
    background: #E8F2E9;
    color: #70A075;
  }
  .del {
    font-size: 13px;
    color: #BAB3A8;
    cursor: pointer;
    margin-top: 6px;
  }
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: #B0A99E;
  }
  .nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: #fff;
    border-top: 1px solid #F0EAE0;
    display: flex;
    justify-content: space-around;
    padding: 16px 0;
  }
  .nav-item {
    font-size: 12px;
    color: #8A857C;
    text-align: center;
    cursor: pointer;
  }
  .nav-item.active {
    color: #7B9270;
    font-weight: 500;
  }
</style>
</head>
<body>

<!-- 列表页 -->
<div class="page active" id="list">
  <div class="header">🥦 冰箱食材管理</div>
  <button class="btn" onclick="go('add')">➕ 添加食材</button>
  <div class="card" id="listWrap"></div>
</div>

<!-- 添加页 -->
<div class="page" id="add">
  <div class="header">
    <div class="back" onclick="go('list')">←</div>
    <div>添加食材</div>
    <div></div>
  </div>
  <input class="input" id="name" placeholder="食材名称" />
  <input class="input" id="day" type="number" placeholder="保质期天数" />
  <select class="select" id="cate">
    <option value="蔬菜">蔬菜</option>
    <option value="肉类">肉类</option>
    <option value="蛋奶">蛋奶</option>
    <option value="水果">水果</option>
    <option value="其他">其他</option>
  </select>
  <button class="btn" onclick="save()">保存</button>
  <button class="btn btn-outline" onclick="go('list')">取消</button>
</div>

<div class="nav">
  <div class="nav-item" onclick="go('list')">📋 食材列表</div>
  <div class="nav-item" onclick="go('add')">➕ 添加</div>
</div>

<script>
let foods = JSON.parse(localStorage.getItem('foods')) || []

function go(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'))
  document.getElementById(id).classList.add('active')
}

function save() {
  const name = document.getElementById('name').value.trim()
  const day = parseInt(document.getElementById('day').value)
  const cate = document.getElementById('cate').value
  if (!name || isNaN(day)) {
    alert('请填写完整信息')
    return
  }
  foods.push({ name, day, cate, time: Date.now() })
  localStorage.setItem('foods', JSON.stringify(foods))
  render()
  go('list')
}

function del(index) {
  if (!confirm('确定删除？')) return
  foods.splice(index, 1)
  localStorage.setItem('foods', JSON.stringify(foods))
  render()
}

function render() {
  const wrap = document.getElementById('listWrap')
  if (foods.length === 0) {
    wrap.innerHTML = '<div class="empty">暂无食材</div>'
    return
  }
  const sorted = [...foods].sort((a, b) => {
    const la = Math.max(0, a.day - Math.floor((Date.now() - a.time)/86400000))
    const lb = Math.max(0, b.day - Math.floor((Date.now() - b.time)/86400000))
    return la - lb
  })
  wrap.innerHTML = sorted.map((f, i) => {
    const left = Math.max(0, f.day - Math.floor((Date.now() - f.time)/86400000))
    let tag = ''
    if (left <= 1) tag = '<div class="tag red">即将过期</div>'
    else if (left <= 3) tag = '<div class="tag orange">注意保鲜</div>'
    else tag = '<div class="tag green">正常</div>'
    return `
      <div class="food-item">
        <div>
          <div class="food-name">${f.name}</div>
          <div class="food-info">${f.cate} · 剩余 ${left} 天</div>
        </div>
        <div style="text-align:right">
          ${tag}
          <div class="del" onclick="del(${i})">删除</div>
        </div>
      </div>
    `
  }).join('')
}

render()
</script>
</body>
</html>
