<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冰箱</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system, BlinkMacSystemFont, sans-serif}
  body{background:#F8F7F2;color:#333;max-width:480px;margin:0 auto;padding:20px 16px 100px}
  .page{display:none}
  .page.active{display:block}

  .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .title{font-size:22px;font-weight:600;color:#5A7A56}
  .back{font-size:18px;color:#5A7A56;cursor:pointer}
  
  .btn{width:100%;padding:14px;border:none;border-radius:14px;background:#92B992;color:#fff;font-size:15px;font-weight:500;margin-bottom:12px;cursor:pointer}
  .btn-outline{background:#fff;border:1px solid #E0E0D7;color:#5A7A56}
  .small-btn{padding:8px 12px;border-radius:8px;font-size:12px;border:none;background:#F1F3EF;color:#5A7A56;cursor:pointer}

  /* 加大右上角添加按钮 */
  .add-btn-large{
    width:44px;height:44px;border-radius:12px;background:#92B992;
    display:flex;align-items:center;justify-content:center;
    font-size:20px;color:#fff;border:none;cursor:pointer;
  }

  .food-card{background:#fff;border-radius:20px;padding:16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
  .food-row{display:flex;align-items:center;gap:12px}
  .food-icon{width:44px;height:44px;border-radius:12px;background:#F1F3EF;display:flex;align-items:center;justify-content:center;font-size:20px}
  .food-name{font-weight:500;font-size:16px;margin-bottom:4px}
  .food-desc{font-size:12px;color:#888;margin-bottom:4px;line-height:1.4}
  .food-exp-main{font-size:15px;font-weight:600;color:#E5989B;margin-top:4px;margin-bottom:6px}

  /* 进度条：剩余越少越短，颜色区分 */
  .exp-bar-wrap{width:100%;height:6px;background:#F1F3EF;border-radius:3px;overflow:hidden;margin-top:4px}
  .exp-bar{height:100%;border-radius:3px;transition:width 0.2s ease}

  .input-group{margin-bottom:16px}
  .input-group label{display:block;font-size:14px;margin-bottom:6px;color:#555}
  input{width:100%;padding:16px;border:1px solid #E0E0D7;border-radius:12px;background:#fff;font-size:15px}

  /* 图标按钮组 + 选中高亮 */
  .icon-group{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
  .icon-btn{
    padding:10px 12px;border-radius:10px;background:#F1F3EF;color:#555;
    font-size:14px;cursor:pointer;white-space:nowrap
  }
  .icon-btn.active{background:#92B992;color:#fff}

  .action-row{margin-top:10px;display:flex;gap:6px}
  .recipe-sheet{margin-top:12px;padding-top:12px;border-top:1px dashed #D8E2D7}
  .recipe-title{font-size:14px;font-weight:500;color:#5A7A56;margin-bottom:10px}

  .recipe-item{background:#F8FFF8;border:1px solid #E0E9DF;border-radius:12px;padding:14px;margin-bottom:8px;font-size:15px;cursor:pointer}
  .recipe-name{font-weight:500;color:#3D5A45;margin-bottom:6px}
  .recipe-meta{display:flex;gap:10px;font-size:12px;color:#7A9A7A;margin-bottom:4px}

  /* 食谱弹窗白底 */
  .recipe-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px}
  .recipe-modal-content{background:#fff;border-radius:20px;width:100%;max-width:400px;padding:20px;max-height:80vh;overflow-y:auto}
  .recipe-modal-title{font-size:18px;font-weight:600;color:#3D5A45;margin-bottom:8px}
  .recipe-modal-sub{font-size:14px;color:#6D8F6D;margin-bottom:16px}
  .recipe-modal-section{margin-bottom:16px}
  .recipe-modal-section-title{font-size:14px;font-weight:500;color:#5A7A56;margin-bottom:8px}
  .recipe-modal-ing{font-size:14px;line-height:1.6;margin-bottom:4px}
  .recipe-modal-step{font-size:14px;line-height:1.7;margin-bottom:6px}
  .recipe-modal-close{width:100%;padding:12px;border-radius:12px;background:#92B992;color:#fff;border:none;font-size:15px;cursor:pointer}
</style>
</head>
<body>

<div class="page active" id="main">
  <div class="header">
    <div class="title">🌱 我的冰箱</div>
    <button class="add-btn-large" onclick="goAdd()">➕</button>
  </div>
  <div id="foodList"></div>
</div>

<div class="page" id="editPage">
  <div class="header">
    <div class="back" onclick="goMain()">←</div>
    <div>食材信息</div>
  </div>
  <div class="input-group">
    <label>食材名称</label>
    <input id="foodName">
  </div>
  <div class="input-group">
    <label>生产日期</label>
    <input type="date" id="produceDate">
  </div>
  <div class="input-group">
    <label>保质期天数</label>
    <div class="icon-group">
      <div class="icon-btn" data-val="1">1天</div>
      <div class="icon-btn" data-val="3">3天</div>
      <div class="icon-btn" data-val="7">7天</div>
      <div class="icon-btn" data-val="15">15天</div>
      <div class="icon-btn" data-val="30">30天</div>
    </div>
  </div>
  <div class="input-group">
    <label>分类</label>
    <div class="icon-group">
      <div class="icon-btn" data-cate="Vegetable">🥬 蔬菜</div>
      <div class="icon-btn" data-cate="Fruit">🍎 水果</div>
      <div class="icon-btn" data-cate="Meat">🥩 肉类</div>
      <div class="icon-btn" data-cate="Seafood">🦐 海鲜</div>
      <div class="icon-btn" data-cate="Dairy">🥛 蛋奶</div>
      <div class="icon-btn" data-cate="Other">📦 其他</div>
    </div>
  </div>
  <button class="btn" onclick="saveFood()">保存</button>
  <button class="btn btn-outline" onclick="goMain()">取消</button>
</div>

<div id="recipeModal" class="recipe-modal" style="display:none">
  <div class="recipe-modal-content">
    <div class="recipe-modal-title" id="modalTitle"></div>
    <div class="recipe-modal-sub" id="modalSub"></div>
    <div class="recipe-modal-section">
      <div class="recipe-modal-section-title">📦 食材用量</div>
      <div id="modalIngredients"></div>
    </div>
    <div class="recipe-modal-section">
      <div class="recipe-modal-section-title">👣 详细步骤</div>
      <div id="modalSteps"></div>
    </div>
    <button class="recipe-modal-close" onclick="closeRecipeModal()">关闭</button>
  </div>
</div>

<script>
const portionConfig = {
  1: { label: "1人餐", ratio: 1 },
  2: { label: "2人餐", ratio: 2 },
  4: { label: "4人餐", ratio: 4 }
};

let editId = -1;
let openRecipeId = -1;
let selectedExpire = 7;
let selectedCate = "Vegetable";
let currentType = "fast"; // fast=快手菜 slow=精致菜
let currentPortion = 1;

// 菜谱分为：快手菜 / 精致菜
const recipeDB = {
  // 快手菜 ≤20分钟
  "青椒炒牛肉":{type:"fast",time:12,base:{牛肉:180,青椒:150,蒜:8,生抽:12,盐:2}},
  "黑椒牛肉粒":{type:"fast",time:15,base:{牛肉:180,洋葱:80,黑胡椒:2,生抽:10}},
  "芹菜炒牛肉":{type:"fast",time:14,base:{牛肉:180,芹菜:200,蒜:6,生抽:10}},
  "孜然牛肉":{type:"fast",time:13,base:{牛肉:180,洋葱:100,孜然:5}},
  "青椒炒肉":{type:"fast",time:10,base:{猪肉:180,青椒:200,蒜:6}},
  "白灼虾":{type:"fast",time:6,base:{虾:250,姜:8,葱:10}},
  "虾仁滑蛋":{type:"fast",time:9,base:{虾:150,鸡蛋:3,盐:2}},
  "西红柿炒蛋":{type:"fast",time:8,base:{番茄:200,鸡蛋:3,盐:2}},
  "蒜蓉娃娃菜":{type:"fast",time:10,base:{娃娃菜:300,大蒜:20}},
  "酸辣土豆丝":{type:"fast",time:8,base:{土豆:300,蒜:8,醋:15}},
  // 精致菜 >20分钟
  "水煮牛肉":{type:"slow",time:22,base:{牛肉:200,生菜:150,蒜:15}},
  "红烧肉":{type:"slow",time:55,base:{五花肉:350,葱:15,姜:8}},
  "土豆烧牛肉":{type:"slow",time:75,base:{牛肉:250,土豆:200,葱:15,姜:10}},
  "番茄炖牛肉":{type:"slow",time:68,base:{牛肉:250,番茄:250,葱:10,姜:8}},
  "红烧牛肉":{type:"slow",time:80,base:{牛肉:350,葱:20,姜:12}},
  "可乐鸡腿":{type:"slow",time:28,base:{鸡腿:300,可乐:200,姜:8}}
};

for(let k in recipeDB){
  recipeDB[k].steps = [
    "1.食材洗净切配",
    "2.主料预处理/腌制",
    "3.热锅爆香辅料",
    "4.下入主料翻炒",
    "5.加调料调味",
    "6.出锅装盘"
  ];
}

const recipeMap = {
  "牛肉":["青椒炒牛肉","黑椒牛肉粒","芹菜炒牛肉","孜然牛肉","水煮牛肉","土豆烧牛肉","番茄炖牛肉","红烧牛肉"],
  "猪肉":["红烧肉","青椒炒肉"],
  "虾":["白灼虾","虾仁滑蛋"],
  "鸡蛋":["西红柿炒蛋"],
  "土豆":["酸辣土豆丝"],
  "娃娃菜":["蒜蓉娃娃菜"],
  "鸡腿":["可乐鸡腿"]
};

const aliasMap = {"牛腩":"牛肉","五花肉":"猪肉","鸡胸肉":"鸡肉","基围虾":"虾","番茄":"西红柿"};

let foods = JSON.parse(localStorage.getItem("foods"))||[];

// 页面切换
function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
function goMain(){showPage("main");renderList();}
function goAdd(){
  editId=-1;
  document.getElementById("foodName").value="";
  document.getElementById("produceDate").valueAsDate = new Date();
  selectedExpire=7;
  selectedCate="Vegetable";
  refreshSelectUI();
  showPage("editPage");
}
function goEdit(id){
  editId=id;
  const f=foods[id];
  document.getElementById("foodName").value=f.name;
  document.getElementById("produceDate").value=f.produceDate;
  selectedExpire=parseInt(f.expireDay);
  selectedCate=f.cate;
  refreshSelectUI();
  showPage("editPage");
}

// 选中状态刷新
function refreshSelectUI(){
  document.querySelectorAll("#editPage .icon-btn").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(`#editPage .icon-btn[data-val="${selectedExpire}"]`).forEach(b=>b.classList.add("active"));
  document.querySelectorAll(`#editPage .icon-btn[data-cate="${selectedCate}"]`).forEach(b=>b.classList.add("active"));
}

// 绑定点击事件
document.querySelectorAll("#editPage .icon-btn[data-val]").forEach(b=>{
  b.onclick=()=>{selectedExpire=parseInt(b.dataset.val);refreshSelectUI();}
});
document.querySelectorAll("#editPage .icon-btn[data-cate]").forEach(b=>{
  b.onclick=()=>{selectedCate=b.dataset.cate;refreshSelectUI();}
});

// 保存
function saveFood(){
  const name=document.getElementById("foodName").value.trim();
  const pd=document.getElementById("produceDate").value;
  if(!name||!pd){alert("请填写完整");return;}
  const item={name,produceDate:pd,expireDay:selectedExpire,cate:selectedCate};
  editId>=0 ? foods[editId]=item : foods.push(item);
  localStorage.setItem("foods",JSON.stringify(foods));
  goMain();
}

function delFood(id){
  if(!confirm("确认删除？"))return;
  foods.splice(id,1);
  localStorage.setItem("foods",JSON.stringify(foods));
  renderList();
}

function toggleRec(id){
  openRecipeId=openRecipeId===id?-1:id;
  renderList();
}

function setType(t){currentType=t;renderList();}
function setPortion(p){currentPortion=p;renderList();}

// 过期状态：剩余越少进度条越短
function getExpireStatus(f){
  const pd=new Date(f.produceDate);
  const now=new Date();
  const passed=Math.floor((now-pd)/86400000);
  const total=+f.expireDay;
  const left=Math.max(0,total-passed);
  const ratio=left/total;
  let color="#92B992";
  if(left<=1)color="#E5989B";
  else if(left<=3)color="#F5C99A";
  return {left,ratio,color,pd,exp:new Date(pd.getTime()+total*86400000)};
}

function getIcon(c){
  const m={Vegetable:"🥬",Fruit:"🍎",Meat:"🥩",Seafood:"🦐",Dairy:"🥛",Other:"📦"};
  return m[c]||"📦";
}

// 获取菜谱：按快手/精致菜
function getFilteredRecipes(name){
  const key=aliasMap[name]||name;
  const all=recipeMap[key]||[];
  return all.filter(r=>recipeDB[r].type===currentType).slice(0,6);
}

// 食谱弹窗
function openRecipeModal(name){
  const d=recipeDB[name];
  if(!d)return;
  const ratio=portionConfig[currentPortion].ratio;
  document.getElementById("modalTitle").innerText=name;
  document.getElementById("modalSub").innerText=`${d.time}分钟 ｜ ${portionConfig[currentPortion].label}`;
  document.getElementById("modalIngredients").innerHTML=Object.entries(d.base).map(([k,v])=>
    `<div class="recipe-modal-ing">⚪ ${k}：${Math.round(v*ratio)}g</div>`
  ).join("");
  document.getElementById("modalSteps").innerHTML=d.steps.map(s=>
    `<div class="recipe-modal-step">${s}</div>`
  ).join("");
  document.getElementById("recipeModal").style.display="flex";
}
function closeRecipeModal(){
  document.getElementById("recipeModal").style.display="none";
}

// 列表渲染：按剩余天数升序
function renderList(){
  const c=document.getElementById("foodList");
  if(!foods.length){c.innerHTML=`<div style="text-align:center;padding:40px;color:#999">暂无食材</div>`;return;}
  const sorted=[...foods].map((f,id)=>({f,id})).sort((a,b)=>getExpireStatus(a.f).left-getExpireStatus(b.f).left);
  c.innerHTML=sorted.map(({f,id})=>{
    const s=getExpireStatus(f);
    const show=openRecipeId===id;
    const list=getFilteredRecipes(f.name);
    return `
    <div class="food-card">
      <div class="food-row">
        <div class="food-icon">${getIcon(f.cate)}</div>
        <div style="flex:1">
          <div class="food-name">${f.name}</div>
          <div class="food-desc">生产：${s.pd.toLocaleDateString()}｜过期：${s.exp.toLocaleDateString()}｜保质：${f.expireDay}天</div>
          <div class="food-exp-main">剩余 ${s.left} 天</div>
          <div class="exp-bar-wrap">
            <div class="exp-bar" style="width:${s.ratio*100}%;background:${s.color}"></div>
          </div>
        </div>
      </div>
      <div class="action-row">
        <button class="small-btn" onclick="goEdit(${id})">编辑</button>
        <button class="small-btn" onclick="delFood(${id})">删除</button>
        <button class="small-btn" onclick="toggleRec(${id})">${show?"收起":"菜谱"}</button>
      </div>
      ${show?`
      <div class="recipe-sheet">
        <div class="recipe-title">菜谱类型</div>
        <div class="icon-group">
          <div class="icon-btn ${currentType==='fast'?'active':''}" onclick="setType('fast')">⚡ 快手菜</div>
          <div class="icon-btn ${currentType==='slow'?'active':''}" onclick="setType('slow')">🍽️ 精致菜</div>
        </div>
        <div class="recipe-title" style="margin-top:10px">份量</div>
        <div class="icon-group">
          <div class="icon-btn ${currentPortion===1?'active':''}" onclick="setPortion(1)">1人餐</div>
          <div class="icon-btn ${currentPortion===2?'active':''}" onclick="setPortion(2)">2人餐</div>
          <div class="icon-btn ${currentPortion===4?'active':''}" onclick="setPortion(4)">4人餐</div>
        </div>
        ${list.map(r=>`
        <div class="recipe-item" onclick="openRecipeModal('${r}')">
          <div class="recipe-name">${r}</div>
          <div class="recipe-meta">${recipeDB[r].time}分钟</div>
        </div>`).join("")}
        ${list.length===0?'<div style="font-size:12px;color:#888">暂无该类型菜谱</div>':''}
      </div>`:""}
    </div>`;
  }).join("");
}

renderList();
</script>
</body>
</html>
