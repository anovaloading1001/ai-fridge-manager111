<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>食材管家</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system, BlinkMacSystemFont, sans-serif}
  body{background:#F5F0E6;color:#333;max-width:480px;margin:0 auto;padding:24px 16px 120px}

  .page{display:none}
  .page.active{display:block}

  .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
  .header-title{display:flex;align-items:center;gap:8px}
  .header-title .icon{font-size:22px}
  .header-title .text{font-size:20px;font-weight:700;color:#6F7C4D}

  .add-btn{
    width:48px;height:48px;
    border-radius:16px;border:none;
    background:#9CAF88;color:#fff;
    font-size:24px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 4px 12px rgba(156,175,136,0.25);
    cursor:pointer;
  }

  .food-card{
    background:#fff;border-radius:20px;
    padding:18px;margin-bottom:12px;
    box-shadow:0 2px 10px rgba(156,175,136,0.08);
  }
  .food-row{display:flex;align-items:center;gap:14px}
  .food-icon{
    width:48px;height:48px;border-radius:14px;
    background:#F5F0E6;display:flex;
    align-items:center;justify-content:center;
    font-size:22px;
  }
  .food-name{font-size:17px;font-weight:600;color:#6F7C4D;margin-bottom:4px}
  .food-info{font-size:13px;color:#8A9A9B;line-height:1.4;margin-bottom:6px}
  .food-left{
    font-size:14px;
    color:#8A9A9B;
    margin-bottom:8px;
    padding:2px 6px;
    border-radius:4px;
    background:#E8DDD0;
    display:inline-block;
  }

  .progress-bar{width:100%;height:6px;background:#D0D8C0;border-radius:3px;overflow:hidden}
  .progress-safe{background:#9CAF88}
  .progress-warning{background:#F9E5C1}
  .progress-danger{background:#B87C5E}

  .action-row{display:flex;gap:8px;margin-top:14px}
  .small-btn{
    flex:1;padding:10px;border-radius:12px;border:none;
    background:#F5F0E6;color:#6F7C4D;font-size:14px;cursor:pointer;
  }

  .input-group{margin-bottom:18px}
  .input-label{font-size:14px;font-weight:500;color:#6F7C4D;margin-bottom:8px}
  .input-field{
    width:100%;padding:16px;border-radius:14px;
    border:1px solid #E8DDD0;background:#fff;font-size:15px;
  }

  .icon-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .tag-btn{
    padding:10px 14px;border-radius:12px;background:#F5F0E6;
    font-size:14px;color:#6F7C4D;border:none;cursor:pointer;
  }
  .tag-btn.active{background:#9CAF88;color:#fff}

  .btn-primary{
    width:100%;padding:16px;border-radius:14px;border:none;
    background:#9CAF88;color:#fff;font-size:15px;font-weight:500;
    margin-top:8px;cursor:pointer;
  }
  .btn-outline{
    width:100%;padding:16px;border-radius:14px;
    border:1px solid #E8DDD0;background:#fff;color:#6F7C4D;
    font-size:15px;margin-top:8px;cursor:pointer;
  }

  .recipe-panel{margin-top:16px;padding-top:16px;border-top:1px solid #E8DDD0}
  .recipe-title{font-size:15px;font-weight:600;color:#6F7C4D;margin-bottom:12px}
  .refresh-btn{
    padding:8px 12px;border-radius:10px;background:#F5F0E6;
    font-size:13px;border:none;cursor:pointer;margin-bottom:10px;color:#6F7C4D
  }

  .recipe-item{
    background:#F9F7F2;border-radius:14px;padding:14px;margin-bottom:8px;
  }
  .recipe-name{font-size:15px;font-weight:600;color:#6F7C4D;margin-bottom:6px}
  .material-list{font-size:13px;line-height:1.5;color:#8A9A9B}
  .mat-have{color:#6F7C4D}
  .mat-lack{color:#B8B9A7}
</style>
</head>
<body>

<div class="page active" id="mainPage">
  <div class="header">
    <div class="header-title">
      <span class="icon">🥡</span>
      <span class="text">食材管家</span>
    </div>
    <button class="add-btn" onclick="goAdd()">+</button>
  </div>
  <div id="listContainer"></div>
</div>

<div class="page" id="editPage">
  <div class="header">
    <div class="header-title">
      <span class="text">食材信息</span>
    </div>
    <button class="add-btn" style="background:#8A9A9B;font-size:16px" onclick="goMain()">←</button>
  </div>

  <div class="input-group">
    <div class="input-label">食材名称</div>
    <input id="foodName" class="input-field" placeholder="如：牛肉、白菜、虾">
  </div>

  <div class="input-group">
    <div class="input-label">生产日期</div>
    <input type="date" id="produceDate" class="input-field">
  </div>

  <div class="input-group">
    <div class="input-label">保质期天数</div>
    <div class="icon-group">
      <button class="tag-btn" data-val="1">1天</button>
      <button class="tag-btn" data-val="3">3天</button>
      <button class="tag-btn" data-val="7">7天</button>
      <button class="tag-btn" data-val="15">15天</button>
      <button class="tag-btn" data-val="30">30天</button>
    </div>
  </div>

  <div class="input-group">
    <div class="input-label">分类</div>
    <div class="icon-group">
      <button class="tag-btn" data-cate="Meat">🥩 肉类</button>
      <button class="tag-btn" data-cate="Vegetable">🥬 蔬菜</button>
      <button class="tag-btn" data-cate="Seafood">🦐 海鲜</button>
      <button class="tag-btn" data-cate="Other">📦 其他</button>
    </div>
  </div>

  <button class="btn-primary" onclick="saveFood()">保存</button>
  <button class="btn-outline" onclick="goMain()">取消</button>
</div>

};

const materialKeys = [
  "猪肉","排骨","牛肉","牛腩","羊肉","羊排","鸡肉","鸡翅","鸡腿","鸭肉","鸭脖","鹅肉","鸽子肉","兔肉","培根","火腿",
  "白菜","菠菜","生菜","油菜","芹菜","韭菜","番茄","黄瓜","冬瓜","南瓜","茄子","青椒","土豆","胡萝卜","白萝卜",
  "莲藕","西兰花","花椰菜","洋葱","大蒜","玉米","山药","豆腐","鸡蛋",
  "带鱼","黄花鱼","鲈鱼","鲫鱼","草鱼","对虾","皮皮虾","梭子蟹","扇贝","蛤蜊","生蚝","鱿鱼","海带","紫菜","三文鱼","鳕鱼"
];

function getMaterials(recipeName) {
  const mats = materialKeys.filter(k => recipeName.includes(k));
  if(recipeName.includes("鸡丁") && !mats.includes("鸡肉")) mats.push("鸡肉");
  if(recipeName.includes("虾仁") && !mats.includes("对虾")) mats.push("对虾");
  if(recipeName.includes("肉丝") && !mats.includes("猪肉")) mats.push("猪肉");
  if(recipeName.includes("炒蛋") && !mats.includes("鸡蛋")) mats.push("鸡蛋");
  if(recipeName.includes("豆腐") && !mats.includes("豆腐")) mats.push("豆腐");
  if(recipeName.includes("山药") && !mats.includes("山药")) mats.push("山药");
  if(recipeName.includes("玉米") && !mats.includes("玉米")) mats.push("玉米");
  return mats;
}

let foods = JSON.parse(localStorage.getItem("foods")) || [];
let editId = -1;
let openCardId = -1;
let selectedDay = 7;
let selectedCate = "Meat";
let recipeShuffleSeed = {};

function showPage(id) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goMain() { showPage("mainPage"); renderList(); }
function goAdd() {
  editId = -1;
  document.getElementById("foodName").value = "";
  document.getElementById("produceDate").valueAsDate = new Date();
  selectedDay = 7;
  selectedCate = "Meat";
  refreshTags();
  showPage("editPage");
}

function goEdit(id) {
  const f = foods[id];
  editId = id;
  document.getElementById("foodName").value = f.name;
  document.getElementById("produceDate").value = f.produceDate;
  selectedDay = +f.expireDay;
  selectedCate = f.cate;
  refreshTags();
  showPage("editPage");
}

function refreshTags() {
  document.querySelectorAll(".tag-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(`.tag-btn[data-val="${selectedDay}"]`).forEach(b => b.classList.add("active"));
  document.querySelectorAll(`.tag-btn[data-cate="${selectedCate}"]`).forEach(b => b.classList.add("active"));
}

document.querySelectorAll(".tag-btn[data-val]").forEach(b => {
  b.onclick = () => { selectedDay = +b.dataset.val; refreshTags(); }
});
document.querySelectorAll(".tag-btn[data-cate]").forEach(b => {
  b.onclick = () => { selectedCate = b.dataset.cate; refreshTags(); }
});

function saveFood() {
  const name = document.getElementById("foodName").value.trim();
  const pd = document.getElementById("produceDate").value;
  if (!name || !pd) { alert("请填写完整"); return; }
  const item = { name, produceDate: pd, expireDay: selectedDay, cate: selectedCate };
  editId >= 0 ? foods[editId] = item : foods.push(item);
  localStorage.setItem("foods", JSON.stringify(foods));
  goMain();
}

function delFood(id) {
  if (!confirm("确认删除？")) return;
  foods.splice(id, 1);
  localStorage.setItem("foods", JSON.stringify(foods));
  renderList();
}

function toggleRec(id) {
  openCardId = openCardId === id ? -1 : id;
  recipeShuffleSeed[id] = (recipeShuffleSeed[id] || 0) + 1;
  renderList();
}

function refreshRec(id) {
  recipeShuffleSeed[id] = (recipeShuffleSeed[id] || 0) + 1;
  renderList();
}

function getStatus(f) {
  const pd = new Date(f.produceDate);
  const now = new Date();
  const passed = Math.floor((now - pd) / 86400000);
  const total = +f.expireDay;
  const left = Math.max(0, total - passed);
  const ratio = left / total;
  let cls = "progress-safe";
  if (left <= 1) cls = "progress-danger";
  else if (left <= 3) cls = "progress-warning";
  return { left, ratio, cls };
}

function getIcon(name) {
  return emojiMap[name] || "🥦";
}

function shuffle(arr, seed) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor((seed * 31 + i) % (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderList() {
  const container = document.getElementById("listContainer");
  if (foods.length === 0) {
    container.innerHTML = `<div style="text-align:center;padding:60px 20px;color:#8A9A9B">暂无食材，点击右上角 + 添加</div>`;
    return;
  }
  const sorted = [...foods]
    .map((f, id) => ({ f, id }))
    .sort((a, b) => getStatus(a.f).left - getStatus(b.f).left);

  container.innerHTML = sorted.map(({ f, id }) => {
    const s = getStatus(f);
    const show = openCardId === id;
    const allRec = recipeLib[f.name] || [];
    const seed = recipeShuffleSeed[id] || 0;
    const list = shuffle(allRec, seed).slice(0, 3);
    const myFoodNames = foods.map(x => x.name);
    const pd = new Date(f.produceDate);
    const exp = new Date(pd.getTime() + f.expireDay * 86400000);
    return `
    <div class="food-card">
      <div class="food-row">
        <div class="food-icon">${getIcon(f.name)}</div>
        <div style="flex:1">
          <div class="food-name">${f.name}</div>
          <div class="food-info">
            生产 ${pd.toLocaleDateString()} ｜ 过期 ${exp.toLocaleDateString()} ｜ 保质 ${f.expireDay}天
          </div>
          <div class="food-left">剩余 ${s.left} 天</div>
          <div class="progress-bar">
            <div class="${s.cls}" style="width:${s.ratio*100}%"></div>
          </div>
        </div>
      </div>

      <div class="action-row">
        <button class="small-btn" onclick="goEdit(${id})">编辑</button>
        <button class="small-btn" onclick="delFood(${id})">删除</button>
        <button class="small-btn" onclick="toggleRec(${id})">${show?"收起":"推荐菜"}</button>
      </div>

      ${show ? `
      <div class="recipe-panel">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="recipe-title">推荐搭配</div>
          <button class="refresh-btn" onclick="refreshRec(${id})">换一批</button>
        </div>
        ${list.map(r => {
          const mats = getMaterials(r);
          return `
          <div class="recipe-item">
            <div class="recipe-name">${r}</div>
            <div class="material-list">
              ${mats.map(m =>
                myFoodNames.includes(m)
                  ? `<span class="mat-have">● ${m}</span>`
                  : `<span class="mat-lack">○ ${m}</span>`
              ).join("　")}
            </div>
          </div>`;
        }).join("")}
      </div>` : ""}
    </div>`;
  }).join("");
}

renderList();
</script>
</body>
</html>
