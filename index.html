<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冰箱食材管家</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <!-- 配置Tailwind自定义颜色和字体 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#F9F3E7', // 暖米色
                        secondary: '#C3E8D5', // 淡绿色
                        wood: '#E8D5B7', // 浅原木色
                        red: '#FF6B6B',
                        orange: '#FFB86C',
                        green: '#8CD790',
                    },
                    fontFamily: {
                        sans: ['Nunito', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 4px 12px rgba(0, 0, 0, 0.05)',
                        'hover': '0 6px 16px rgba(0, 0, 0, 0.08)',
                    }
                },
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card-hover {
                transition: all 0.3s ease;
            }
            .card-hover:hover {
                transform: translateY(-3px);
                box-shadow: var(--tw-shadow-hover);
            }
            .hand-drawn-border {
                border-image: url('data:image/svg+xml;utf8,<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><path d="M5,50 C15,30 35,20 50,20 C65,20 85,30 95,50 C85,70 65,80 50,80 C35,80 15,70 5,50 Z" stroke="%23E8D5B7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>') 30 stretch;
            }
        }
    </style>
</head>
<body class="bg-primary min-h-screen font-sans text-gray-800">
    <!-- 食材列表页 -->
    <div id="ingredients-list" class="container mx-auto px-4 py-6">
        <!-- 顶部标题 -->
        <header class="mb-6">
            <h1 class="text-[clamp(1.8rem,5vw,2.5rem)] font-bold text-center text-gray-700">
                <i class="fa fa-leaf text-secondary mr-2"></i>冰箱食材管家
            </h1>
            <p class="text-center text-gray-500 mt-2">管理您的食材，减少浪费</p>
        </header>
        
        <!-- 食材卡片列表 -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- 过期食材卡片 - 红色标签 -->
            <div class="bg-white rounded-xl p-5 shadow-soft card-hover border-l-4 border-red">
                <div class="flex justify-between items-start">
                    <div>
                        <span class="inline-block px-2 py-1 bg-red/10 text-red rounded-full text-sm font-medium mb-2">已过期</span>
                        <h2 class="text-xl font-semibold">牛奶</h2>
                        <p class="text-gray-500 mt-1">乳制品</p>
                    </div>
                    <div class="text-right">
                        <p class="text-red font-medium">过期2天</p>
                        <p class="text-sm text-gray-400">保质期至: 06/12</p>
                    </div>
                </div>
                <div class="mt-4 flex justify-between items-center">
                    <div class="flex space-x-2">
                        <button class="p-2 rounded-full bg-gray-100 hover:bg-gray-200 transition-colors">
                            <i class="fa fa-edit text-gray-600"></i>
                        </button>
                        <button class="p-2 rounded-full bg-gray-100 hover:bg-gray-200 transition-colors">
                            <i class="fa fa-trash text-gray-600"></i>
                        </button>
                    </div>
                    <div class="text-sm text-gray-400">添加于: 06/01</div>
                </div>
            </div>
            
            <!-- 即将过期食材卡片 - 橙色标签 -->
            <div class="bg-white rounded-xl p-5 shadow-soft card-hover border-l-4 border-orange">
                <div class="flex justify-between items-start">
                    <div>
                        <span class="inline-block px-2 py-1 bg-orange/10 text-orange rounded-full text-sm font-medium mb-2">即将过期</span>
                        <h2 class="text-xl font-semibold">鸡蛋</h2>
                        <p class="text-gray-500 mt-1">蛋类</p>
                    </div>
                    <div class="text-right">
                        <p class="text-orange font-medium">剩余1天</p>
                        <p class="text-sm text-gray-400">保质期至: 06/15</p>
                    </div>
                </div>
                <div class="mt-4 flex justify-between items-center">
                    <div class="flex space-x-2">
                        <button class="p-2 rounded-full bg-gray-100 hover:bg-gray-200 transition-colors">
                            <i class="fa fa-edit text-gray-600"></i>
                        </button>
                        <button class="p-2 rounded-full bg-gray-100 hover:bg-gray-200 transition-colors">
                            <i class="fa fa-trash text-gray-600"></i>
                        </button>
                    </div>
                    <div class="text-sm text-gray-400">添加于: 06/08</div>
                </div>
            </div>
            
            <!-- 新鲜食材卡片 - 绿色标签 -->
            <div class="bg-white rounded-xl p-5 shadow-soft card-hover border-l-4 border-green">
                <div class="flex justify-between items-start">
                    <div>
                        <span class="inline-block px-2 py-1 bg-green/10 text-green rounded-full text-sm font-medium mb-2">新鲜</span>
                        <h2 class="text-xl font-semibold">菠菜</h2>
                        <p class="text-gray-500 mt-1">蔬菜</p>
                    </div>
                    <div class="text-right">
                        <p class="text-green font-medium">剩余5天</p>
                        <p class="text-sm text-gray-400">保质期至: 06/19</p>
                    </div>
                </div>
                <div class="mt-4 flex justify-between items-center">
                    <div class="flex space-x-2">
                        <button class="p-2 rounded-full bg-gray-100 hover:bg-gray-200 transition-colors">
                            <i class="fa fa-edit text-gray-600"></i>
                        </button>
                        <button class="p-2 rounded-full bg-gray-100 hover:bg-gray-200 transition-colors">
                            <i class="fa fa-trash text-gray-600"></i>
                        </button>
                    </div>
                    <div class="text-sm text-gray-400">添加于: 06/10</div>
                </div>
            </div>
            
            <!-- 更多食材卡片 -->
            <div class="bg-white rounded-xl p-5 shadow-soft card-hover border-l-4 border-green">
                <div class="flex justify-between items-start">
                    <div>
                        <span class="inline-block px-2 py-1 bg-green/10 text-green rounded-full text-sm font-medium mb-2">新鲜</span>
                        <h2 class="text-xl font-semibold">鸡胸肉</h2>
                        <p class="text-gray-500 mt-1">肉类</p>
                    </div>
                    <div class="text-right">
                        <p class="text-green font-medium">剩余3天</p>
                        <p class="text-sm text-gray-400">保质期至: 06/17</p>
                    </div>
                </div>
                <div class="mt-4 flex justify-between items-center">
                    <div class="flex space-x-2">
                        <button class="p-2 rounded-full bg-gray-100 hover:bg-gray-200 transition-colors">
                            <i class="fa fa-edit text-gray-600"></i>
                        </button>
                        <button class="p-2 rounded-full bg-gray-100 hover:bg-gray-200 transition-colors">
                            <i class="fa fa-trash text-gray-600"></i>
                        </button>
                    </div>
                    <div class="text-sm text-gray-400">添加于: 06/12</div>
                </div>
            </div>
            
            <div class="bg-white rounded-xl p-5 shadow-soft card-hover border-l-4 border-orange">
                <div class="flex justify-between items-start">
                    <div>
                        <span class="inline-block px-2 py-1 bg-orange/10 text-orange rounded-full text-sm font-medium mb-2">即将过期</span>
                        <h2 class="text-xl font-semibold">酸奶</h2>
                        <p class="text-gray-500 mt-1">乳制品</p>
                    </div>
                    <div class="text-right">
                        <p class="text-orange font-medium">剩余2天</p>
                        <p class="text-sm text-gray-400">保质期至: 06/16</p>
                    </div>
                </div>
                <div class="mt-4 flex justify-between items-center">
                    <div class="flex space-x-2">
                        <button class="p-2 rounded-full bg-gray-100 hover:bg-gray-200 transition-colors">
                            <i class="fa fa-edit text-gray-600"></i>
                        </button>
                        <button class="p-2 rounded-full bg-gray-100 hover:bg-gray-200 transition-colors">
                            <i class="fa fa-trash text-gray-600"></i>
                        </button>
                    </div>
                    <div class="text-sm text-gray-400">添加于: 06/05</div>
                </div>
            </div>
        </div>
        
        <!-- 底部添加按钮 -->
        <div class="fixed bottom-6 right-6">
            <button id="add-ingredient-btn" class="w-14 h-14 bg-secondary rounded-full shadow-soft flex items-center justify-center text-white text-2xl hover:bg-secondary/90 transition-all card-hover">
                <i class="fa fa-plus"></i>
            </button>
        </div>
    </div>
    
    <!-- 添加食材页 (默认隐藏) -->
    <div id="add-ingredient" class="container mx-auto px-4 py-6 hidden">
        <header class="mb-8">
            <div class="flex items-center">
                <button id="back-btn" class="p-2 rounded-full bg-white shadow-soft mr-4">
                    <i class="fa fa-arrow-left text-gray-700"></i>
                </button>
                <h1 class="text-[clamp(1.5rem,4vw,2rem)] font-bold text-gray-700">添加新食材</h1>
            </div>
        </header>
        
        <div class="bg-white rounded-xl p-6 shadow-soft">
            <form id="ingredient-form">
                <div class="mb-6">
                    <label for="name" class="block text-gray-700 font-medium mb-2">食材名称</label>
                    <input type="text" id="name" name="name" placeholder="例如: 牛奶、鸡蛋" 
                           class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-secondary/50 focus:border-secondary transition-colors">
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label for="expiry-date" class="block text-gray-700 font-medium mb-2">保质期至</label>
                        <input type="date" id="expiry-date" name="expiry-date" 
                               class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-secondary/50 focus:border-secondary transition-colors">
                    </div>
                    
                    <div>
                        <label for="category" class="block text-gray-700 font-medium mb-2">分类</label>
                        <select id="category" name="category" 
                                class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-secondary/50 focus:border-secondary transition-colors appearance-none bg-white">
                            <option value="">请选择分类</option>
                            <option value="vegetable">蔬菜</option>
                            <option value="fruit">水果</option>
                            <option value="meat">肉类</option>
                            <option value="dairy">乳制品</option>
                            <option value="grains">谷物</option>
                            <option value="other">其他</option>
                        </select>
                    </div>
                </div>
                
                <div class="mb-6">
                    <label for="notes" class="block text-gray-700 font-medium mb-2">备注 (可选)</label>
                    <textarea id="notes" name="notes" rows="3" placeholder="添加备注信息..." 
                              class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:ring-2 focus:ring-secondary/50 focus:border-secondary transition-colors"></textarea>
                </div>
                
                <button type="submit" class="w-full bg-secondary text-white font-medium py-3 px-4 rounded-lg hover:bg-secondary/90 transition-colors shadow-soft">
                    <i class="fa fa-check mr-2"></i>保存食材
                </button>
            </form>
        </div>
    </div>
    
    <script>
        // 页面切换逻辑
        const listPage = document.getElementById('ingredients-list');
        const addPage = document.getElementById('add-ingredient');
        const addBtn = document.getElementById('add-ingredient-btn');
        const backBtn = document.getElementById('back-btn');
        
        addBtn.addEventListener('click', () => {
            listPage.classList.add('hidden');
            addPage.classList.remove('hidden');
        });
        
        backBtn.addEventListener('click', () => {
            addPage.classList.add('hidden');
            listPage.classList.remove('hidden');
        });
        
        // 表单提交逻辑
        document.getElementById('ingredient-form').addEventListener('submit', (e) => {
            e.preventDefault();
            // 这里可以添加表单提交的处理逻辑
            alert('食材添加成功！');
            addPage.classList.add('hidden');
            listPage.classList.remove('hidden');
        });
    </script>
</body>
</html>
